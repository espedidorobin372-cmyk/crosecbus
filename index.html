<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ang Aking Pahina</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- Bar sa itaas -->
    <div class="top-bar">
        <div class="address-bar">Maghanap sa... o mag-type ng URL</div>
        <div class="top-icons">
            <span>Gmail</span>
            <span>Mga Larawan</span>
            <button id="menuBtn">⋮⋮⋮</button>
        </div>
    </div>

    <!-- Logo sa gitna -->
    <h1 class="logo">AkingPahina</h1>

    <!-- Kahon ng paghahanap -->
    <div class="search-box">
        <input type="text" placeholder="Maghanap dito...">
<div class="shortcuts">
    <div class="shortcut-item">
        <i class="fas fa-folder"></i>
        <span>DRIVER_PACK</span>
    </div>
    <div class="shortcut-item">
        <i class="fas fa-code"></i>
        <span>Java-programm...</span>
    </div>
    <div class="shortcut-item">
        <i class="fas fa-plus-circle"></i>
        <span>Magdagdag ng...</span>
    </div>
</div>
    </div>

    <!-- Menu na lalabas -->
<div id="menu" class="menu">
    <div class="icon-item">
        <i class="fas fa-user-circle"></i>
        <span>Account</span>
    </div>
    <div class="icon-item">
        <i class="fab fa-google-drive"></i>
        <span>Drive</span>
    </div>
    <div class="icon-item">
        <i class="fab fa-youtube"></i>
        <span>YouTube</span>
    </div>
    <div class="icon-item">
        <i class="fas fa-map-marker-alt"></i>
        <span>Maps</span>
    </div>
    <div class="icon-item">
        <i class="fas fa-calendar-alt"></i>
        <span>Calendar</span>
    </div>
    <div class="icon-item">
        <i class="fas fa-images"></i>
        <span>Mga Larawan</span>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
